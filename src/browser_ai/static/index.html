<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>browser-ai UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050509;
      --bg-elevated: #111322;
      --bg-elevated-soft: #15172a;
      --border-subtle: #2a2d45;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.15);
      --accent-strong: #84a9ff;
      --text: #f5f7ff;
      --text-muted: #a2a7c4;
      --danger: #ff5c7a;
      --radius-lg: 12px;
      --radius-md: 8px;
      --shadow-soft: 0 18px 60px rgba(0, 0, 0, 0.65);
      --shadow-subtle: 0 1px 0 rgba(255, 255, 255, 0.02);
      --input-bg: #0b0d18;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #15172a 0, #050509 48%, #020308 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 16px;
    }

    .page {
      width: 100%;
      max-width: 1080px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 8px 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--text-muted);
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      border-radius: 7px;
      background: conic-gradient(
        from 210deg,
        #4f8cff,
        #9f7bff,
        #f35a9b,
        #f4893d,
        #4f8cff
      );
      position: relative;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 0 22px rgba(79, 140, 255, 0.6);
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: radial-gradient(circle at 30% 0, rgba(255, 255, 255, 0.28), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(0, 0, 0, 0.9), transparent 60%);
      mix-blend-mode: soft-light;
    }

    .brand span {
      opacity: 0.9;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .pill {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(
        to bottom right,
        rgba(255, 255, 255, 0.02),
        rgba(0, 0, 0, 0.6)
      );
      box-shadow: var(--shadow-subtle);
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #4f8cff;
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.2);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: 16px;
      align-items: stretch;
    }

    @media (max-width: 880px) {
      .layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .panel {
      background: radial-gradient(circle at top left, #202540 0, #111322 44%, #050509 100%);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(
        circle at 10% -10%,
        rgba(132, 169, 255, 0.12),
        transparent 55%
      );
      opacity: 0.9;
      pointer-events: none;
    }

    .panel-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 4px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .field-label span.key {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
      opacity: 0.9;
    }

    .field-label span.secondary {
      font-size: 11px;
      opacity: 0.8;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: linear-gradient(
        to bottom right,
        var(--input-bg),
        #070815
      );
      color: var(--text);
      padding: 8px 10px;
      font: 400 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      outline: none;
      resize: vertical;
      min-height: 0;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
    }

    textarea {
      min-height: 160px;
      max-height: 360px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(162, 167, 196, 0.75);
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 1px rgba(79, 140, 255, 0.6),
        0 0 0 1px rgba(0, 0, 0, 0.8),
        0 0 32px rgba(79, 140, 255, 0.45);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1 1 0;
      min-width: 0;
    }

    .row-compact {
      align-items: center;
      justify-content: space-between;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: transform 0.06s ease-out, box-shadow 0.06s ease-out,
        background 0.06s ease-out, opacity 0.06s ease-out;
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f8cff, #9f7bff);
      color: #050509;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.65),
        0 18px 30px rgba(79, 140, 255, 0.65);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-0.5px);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.8),
        0 22px 40px rgba(79, 140, 255, 0.8);
    }

    .btn-secondary {
      background: rgba(9, 11, 24, 0.9);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: var(--shadow-subtle);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(16, 19, 36, 0.95);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn-icon {
      font-size: 14px;
      opacity: 0.9;
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      appearance: none;
      border-radius: 4px;
      border: 1px solid var(--border-subtle);
      background: linear-gradient(to bottom, #070815, #050509);
      display: inline-block;
      position: relative;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: radial-gradient(circle at 30% 0, #ffffff, #84a9ff);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.9),
        0 0 18px rgba(79, 140, 255, 0.85);
    }

    .checkbox-row input[type="checkbox"]::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      border: 2px solid transparent;
      border-left-color: #050509;
      border-bottom-color: #050509;
      transform: rotate(-40deg) scale(0.6);
      opacity: 0;
      transition: opacity 0.08s ease-out;
    }

    .checkbox-row input[type="checkbox"]:checked::after {
      opacity: 1;
    }

    .status-line {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4f8cff;
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.25);
      flex-shrink: 0;
    }

    .status-error {
      color: var(--danger);
    }

    .transcript {
      background: radial-gradient(circle at top left, #1a1c32 0, #040510 55%);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 10px 10px 11px;
      height: 100%;
      min-height: 220px;
      max-height: 540px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: var(--shadow-soft);
    }

    .transcript-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 18px 18px 20px;
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at top, rgba(79, 140, 255, 0.11), transparent 50%);
    }

    .chat-item {
      padding: 9px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: rgba(4, 6, 18, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .chat-item.assistant {
      background: radial-gradient(circle at top left, rgba(79, 140, 255, 0.22), rgba(5, 7, 20, 0.98));
      border-color: rgba(79, 140, 255, 0.36);
    }

    .chat-role {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
      opacity: 0.9;
    }

    .chat-content {
      white-space: pre-wrap;
    }

    footer {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 4px 4px;
    }

    footer a {
      color: var(--accent-strong);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .endpoint-pill {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(3, 6, 18, 0.9);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
        "Courier New", monospace;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .endpoint-pill span.method {
      color: #4f8cff;
      font-weight: 500;
    }

    .endpoint-pill span.path {
      color: rgba(245, 247, 255, 0.92);
    }

    .endpoint-pill span.note {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="brand-mark"></div>
        <span>browser-ai UI</span>
      </div>
      <div class="meta">
        <div class="pill">
          <div class="pill-dot"></div>
          <span>Local dev panel</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <!-- Left: controls -->
      <section class="panel" aria-label="browser-ai controls">
        <div class="panel-inner">
          <div class="field-group">
            <div class="row">
              <div>
                <label for="model" class="field-label">
                  <span class="key">Model</span>
                  <span class="secondary">default: gemini</span>
                </label>
                <input
                  id="model"
                  type="text"
                  name="model"
                  value="gemini"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>
              <div>
                <label for="systemPrompt" class="field-label">
                  <span class="key">System prompt</span>
                  <span class="secondary">optional</span>
                </label>
                <input
                  id="systemPrompt"
                  type="text"
                  name="system"
                  placeholder="You are a helpful browser-ai assistant…"
                  autocomplete="off"
                />
              </div>
            </div>
          </div>

          <div class="field-group">
            <label for="prompt" class="field-label">
              <span class="key">Prompt</span>
              <span class="secondary">Shift+Enter for new line</span>
            </label>
            <textarea
              id="prompt"
              name="prompt"
              placeholder="Ask the model to open a page, inspect the DOM, or perform a browser action…"
            ></textarea>
          </div>

          <div class="controls">
            <button id="sendBtn" class="btn-primary" type="button">
              <span class="btn-icon">▶</span>
              <span>Send</span>
            </button>
            <button id="clearBtn" class="btn-secondary" type="button">
              <span class="btn-icon">✕</span>
              <span>Clear</span>
            </button>
          </div>

          <div class="status-line">
            <div class="status-dot" id="status-dot"></div>
            <span id="status">Idle · ready to call <code>/v1/chat/completions</code></span>
          </div>
        </div>
      </section>

      <!-- Right: transcript -->
      <section class="panel" aria-label="chat transcript">
        <div class="panel-inner">
          <div id="chat" class="transcript">
            <div id="transcript-empty" class="transcript-empty">
              Messages will appear here once you send a prompt.
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div>
        Uses the <span class="endpoint-pill">
          <span class="method">POST</span>
          <span class="path">/v1/chat/completions</span>
          <span class="note">(OpenAI-compatible)</span>
        </span>
        endpoint exposed by this server.
      </div>
      <div>
        This page is lightweight and intended for local development only.
      </div>
    </footer>
  </div>

  <script src="/ui/static/app.js"></script>
</body>
</html>
